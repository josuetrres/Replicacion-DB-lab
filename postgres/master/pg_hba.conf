# =============================================================
#  PostgreSQL Master — Host-Based Authentication (pg_hba.conf)
# =============================================================
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Allow local connections (needed for init scripts inside the container)
local   all             all                                     trust

# Allow the postgres superuser from localhost
host    all             all             127.0.0.1/32            md5

# Allow all users to connect to all databases from within the Docker network
# (the API container needs this)
host    all             all             0.0.0.0/0               md5

# ----- REPLICATION -----
# Allow the replication user to open streaming replication connections from
# any address in the Docker bridge network (172.16.0.0/12 covers Docker default ranges).
# The TYPE must be "host" and DATABASE must be "replication".
host    replication     replicator      0.0.0.0/0               md5
