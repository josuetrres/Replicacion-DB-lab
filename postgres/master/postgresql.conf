# =============================================================
#  PostgreSQL Master — WAL Physical Replication Configuration
# =============================================================

# ----- Connection Settings -----
listen_addresses = '*'
port = 5432

# ----- Write-Ahead Logging (WAL) -----
# 'replica' level includes everything needed for streaming replication.
# 'logical' would also work but adds unnecessary overhead.
wal_level = replica

# ----- Streaming Replication -----
# Maximum number of concurrent WAL sender processes (one per replica + some buffer).
max_wal_senders = 10

# Maximum number of replication slots. Each replica gets its own slot so
# the master retains WAL segments until the slowest replica has consumed them.
max_replication_slots = 10

# Allow replicas to run read-only queries (hot standby).
hot_standby = on

# ----- WAL Archiving -----
# Archiving is not strictly required for streaming replication but is good
# practice. We write to /tmp so the container doesn't need external storage.
archive_mode = on
archive_command = 'test ! -f /tmp/pg_archive/%f && cp %p /tmp/pg_archive/%f'

# ----- Checkpoint Settings -----
# Reduce the interval to make recovery faster in the lab environment.
checkpoint_completion_target = 0.9
wal_buffers = 16MB

# ----- Logging (helpful for the lab) -----
log_destination = 'stderr'
logging_collector = off
log_connections = on
log_replication_commands = on
log_min_messages = info
